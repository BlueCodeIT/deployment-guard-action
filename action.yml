name: 'Deployment Guard'
description: 'KI-gestützter Risk Score vor jedem Deployment. Analysiert Code-Änderungen und blockiert riskante Deployments automatisch.'
author: 'BlueCodeIT'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  api-key:
    description: 'Deployment Guard API Key (aus bluecodeit.com/signup)'
    required: true
  fail-on-blocked:
    description: 'Pipeline bei BLOCKED Status fehlschlagen lassen'
    required: false
    default: 'true'
  incidents-last-7d:
    description: 'Anzahl Incidents in den letzten 7 Tagen'
    required: false
    default: '0'
  incidents-last-30d:
    description: 'Anzahl Incidents in den letzten 30 Tagen'
    required: false
    default: '0'
  trivy-critical-cves:
    description: 'Anzahl CRITICAL CVEs aus Trivy'
    required: false
    default: '0'
  trivy-high-cves:
    description: 'Anzahl HIGH CVEs aus Trivy'
    required: false
    default: '0'
  semgrep-findings:
    description: 'Gesamtzahl Semgrep-Findings'
    required: false
    default: '0'
  semgrep-high-severity:
    description: 'Anzahl Semgrep HIGH-Severity Findings (Subset von semgrep-findings)'
    required: false
    default: '0'
  checkov-failed-checks:
    description: 'Gesamtzahl Checkov Failed Checks'
    required: false
    default: '0'
  checkov-critical-failures:
    description: 'Anzahl Checkov CRITICAL Failures (Subset von checkov-failed-checks)'
    required: false
    default: '0'

outputs:
  score:
    description: 'Risk Score (0-100)'
  verdict:
    description: 'Verdict (LOW RISK / MEDIUM RISK / HIGH RISK / CRITICAL RISK)'
  status:
    description: 'Status (PASS / WARN / BLOCKED)'
  explanation:
    description: 'KI-Erklärung des Scores'

runs:
  using: 'composite'
  steps:
    - name: Make script executable
      shell: bash
      run: chmod +x ${{ github.action_path }}/scripts/analyze.sh

    - name: Run Deployment Guard Analysis
      shell: bash
      run: ${{ github.action_path }}/scripts/analyze.sh
      env:
        GUARD_API_KEY: ${{ inputs.api-key }}
        FAIL_ON_BLOCKED: ${{ inputs.fail-on-blocked }}
        INCIDENTS_7D: ${{ inputs.incidents-last-7d }}
        INCIDENTS_30D: ${{ inputs.incidents-last-30d }}
        TRIVY_CRITICAL_CVES: ${{ inputs.trivy-critical-cves }}
        TRIVY_HIGH_CVES: ${{ inputs.trivy-high-cves }}
        SEMGREP_FINDINGS: ${{ inputs.semgrep-findings }}
        SEMGREP_HIGH_SEVERITY: ${{ inputs.semgrep-high-severity }}
        CHECKOV_FAILED_CHECKS: ${{ inputs.checkov-failed-checks }}
        CHECKOV_CRITICAL_FAILURES: ${{ inputs.checkov-critical-failures }}
        GITHUB_REPO: ${{ github.repository }}
        GITHUB_BRANCH: ${{ github.ref_name }}
        GITHUB_SHA: ${{ github.sha }}
      
